name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NX_SKIP_NX_CACHE: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Register ESLint problem matcher
        run: echo "::add-matcher::.github/problem-matchers/eslint.json"

      - name: Register TypeScript problem matcher
        run: echo "::add-matcher::.github/problem-matchers/tsc.json"

      - name: Run ESLint on all workspaces
        run: npx nx run-many -t lint --all

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.base.json --pretty false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: NPM audit (high/critical)
        run: npm audit --audit-level=high

      - name: SAST scan for security anti-patterns
        run: |
          npx eslint . --no-eslintrc --rule '{"no-eval": "error", "no-implied-eval": "error"}' \
            --plugin @eslint/js --ignore-pattern 'node_modules/**' --ignore-pattern 'dist/**' \
            --ignore-pattern '.nx/**' --max-warnings 0 || true

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Check dependency licenses
        run: |
          npx --yes license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;SSPL-1.0;EUPL-1.1;EUPL-1.2" --summary

  test:
    name: Unit Tests
    needs: [lint-typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Register Vitest problem matcher
        run: echo "::add-matcher::.github/problem-matchers/vitest.json"

      - name: Run unit tests with coverage
        run: npx nx run-many -t test --all -- --reporter=verbose --coverage

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npx nx run-many -t build --all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/*/dist
            packages/*/dist
          retention-days: 1

  perf-guardian:
    name: Perf Guardian
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npx nx run-many -t build --all

      - name: Run Perf Guardian budget checks
        id: perf
        run: |
          node packages/perf-guardian/dist/cli.js --config perf-guardian.config.json 2> perf-results.json
          cat perf-results.json

      - name: Post Perf Guardian results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('perf-results.json', 'utf8'));
            } catch (e) {
              results = null;
            }

            let body = '## Perf Guardian Results\n\n';

            if (!results || !results.artifacts) {
              body += '⚠️ Could not parse Perf Guardian output.\n';
            } else {
              const passed = results.artifacts.filter(a => a.status === 'pass');
              const failed = results.artifacts.filter(a => a.status === 'fail');

              if (failed.length === 0) {
                body += '✅ All bundle budgets passed!\n\n';
              } else {
                body += `❌ ${failed.length} artifact(s) exceeded budget:\n\n`;
              }

              body += '| Artifact | Measured (KB) | Budget (KB) | Status | Overage (KB) |\n';
              body += '|----------|--------------|-------------|--------|-------------|\n';

              for (const a of results.artifacts) {
                const status = a.status === 'pass' ? '✅' : '❌';
                const overage = a.overageKb ? a.overageKb.toFixed(1) : '—';
                body += `| ${a.name} | ${a.measuredSizeKb.toFixed(1)} | ${a.budgetThresholdKb.toFixed(1)} | ${status} | ${overage} |\n`;
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Perf Guardian Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  e2e:
    name: E2E Tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          CI: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: playwright-report/
          retention-days: 7

  publish-dry-run:
    name: Publish Dry Run (UI Core)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build UI Core
        run: npx nx run @frontend-monorepo-showcase/ui-core:build

      - name: Publish dry run
        run: npm publish --dry-run
        working-directory: packages/ui-core

  accessibility:
    name: Accessibility Audit
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npx nx run-many -t build --all

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility audit with axe-core
        run: |
          npx concurrently -k -s first \
            "npx http-server apps/host-shell/dist --port 4173 --silent -P http://localhost:4173?" \
            "npx wait-on http://localhost:4173 && npx playwright test --config=playwright.axe.config.ts || true"
