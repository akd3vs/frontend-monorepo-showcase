name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run ESLint on all workspaces
        run: npx nx run-many -t lint --all

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.base.json

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: NPM audit (high/critical)
        run: npm audit --audit-level=high

      - name: SAST scan for security anti-patterns
        run: |
          npx eslint . --no-eslintrc --rule '{"no-eval": "error", "no-implied-eval": "error"}' \
            --plugin @eslint/js --ignore-pattern 'node_modules/**' --ignore-pattern 'dist/**' \
            --ignore-pattern '.nx/**' --max-warnings 0 || true

  test:
    name: Unit Tests
    needs: [lint-typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run unit tests for all workspaces
        run: npx nx run-many -t test --all

  build:
    name: Build
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npx nx run-many -t build --all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/*/dist
            packages/*/dist
          retention-days: 1

  perf-guardian:
    name: Perf Guardian
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npx nx run-many -t build --all

      - name: Run Perf Guardian budget checks
        id: perf
        run: |
          node packages/perf-guardian/dist/cli.js --config perf-guardian.config.json --json > perf-results.json || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat perf-results.json

      - name: Post Perf Guardian results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('perf-results.json', 'utf8'));
            } catch (e) {
              results = null;
            }

            let body = '## Perf Guardian Results\n\n';

            if (!results || !results.artifacts) {
              body += '⚠️ Could not parse Perf Guardian output.\n';
            } else {
              const passed = results.artifacts.filter(a => a.status === 'pass');
              const failed = results.artifacts.filter(a => a.status === 'fail');

              if (failed.length === 0) {
                body += '✅ All bundle budgets passed!\n\n';
              } else {
                body += `❌ ${failed.length} artifact(s) exceeded budget:\n\n`;
              }

              body += '| Artifact | Measured (KB) | Budget (KB) | Status | Overage (KB) |\n';
              body += '|----------|--------------|-------------|--------|-------------|\n';

              for (const a of results.artifacts) {
                const status = a.status === 'pass' ? '✅' : '❌';
                const overage = a.overageKb ? a.overageKb.toFixed(1) : '—';
                body += `| ${a.name} | ${a.measuredSizeKb.toFixed(1)} | ${a.budgetThresholdKb.toFixed(1)} | ${status} | ${overage} |\n`;
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Perf Guardian Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  publish-dry-run:
    name: Publish Dry Run (UI Core)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build UI Core
        run: npx nx run @frontend-monorepo-showcase/ui-core:build

      - name: Publish dry run
        run: npm publish --dry-run
        working-directory: packages/ui-core

  check-ui-core-changes:
    name: Check UI Core Changes
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.ui-core }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for UI Core changes
        id: filter
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^packages/ui-core/'; then
            echo "ui-core=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui-core=false" >> "$GITHUB_OUTPUT"
          fi

  visual-regression:
    name: Visual Regression Tests
    needs: [check-ui-core-changes]
    if: needs.check-ui-core-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npx storybook build --output-dir packages/ui-core/storybook-static
        working-directory: packages/ui-core

      - name: Run visual regression tests
        run: |
          npx concurrently -k -s first \
            "npx http-server packages/ui-core/storybook-static --port 6006 --silent" \
            "npx wait-on http://localhost:6006 && npx test-storybook --url http://localhost:6006"

  accessibility:
    name: Accessibility Audit
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npx nx run-many -t build --all

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility audit with axe-core
        run: |
          npx concurrently -k -s first \
            "npx http-server apps/host-shell/dist --port 4173 --silent -P http://localhost:4173?" \
            "npx wait-on http://localhost:4173 && npx playwright test --config=playwright.axe.config.ts || true"
